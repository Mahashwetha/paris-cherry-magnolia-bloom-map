<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paris Blooms 🌸 Cherry Blossom & Magnolia</title>
<style>
:root {
  --pink-deep: #c0305a;
  --pink-mid:  #e0608a;
  --pink-soft: #f090b0;
  --pink-pale: #f8b8d0;
  --pink-dust: #fcdce8;
  --purple:    #7040a0;
  --green:     #4a7a4a;
  --dark:      #2a1530;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }

body {
  font-family: Georgia,'Times New Roman',serif;
  background: linear-gradient(140deg, #fff8fc 0%, #f5f9f0 60%, #fef5ff 100%);
  min-height: 100vh;
  color: var(--dark);
  overflow-x: hidden;
}

/* ── PETALS ── */
.petals { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.petal  { position:absolute; top:-30px; animation:petalfall linear infinite; user-select:none; }
@keyframes petalfall {
  0%   { transform:translateY(-30px)  rotate(0deg)   translateX(0px);  opacity:.85; }
  40%  { transform:translateY(40vh)   rotate(140deg) translateX(25px); opacity:.65; }
  75%  { transform:translateY(75vh)   rotate(260deg) translateX(-18px);opacity:.4;  }
  100% { transform:translateY(115vh)  rotate(380deg) translateX(10px); opacity:0;   }
}

/* ── HEADER ── */
header {
  position:relative; z-index:1;
  text-align:center;
  padding:26px 20px 10px;
}
header h1   { font-size:clamp(1.3rem,4vw,2.1rem); color:var(--dark); margin-bottom:5px; }
header p    { font-size:.86rem; color:#8a5a80; font-style:italic; }

/* ── LANG TOGGLE ── */
.lang-bar {
  display:flex;
  justify-content:center;
  gap:8px;
  margin-top:12px;
}
.lang-btn {
  padding:5px 18px;
  border-radius:20px;
  border:2px solid var(--pink-soft);
  background:white;
  color:var(--pink-deep);
  font-size:13px;
  font-weight:700;
  font-family:sans-serif;
  cursor:pointer;
  transition:all .18s;
  letter-spacing:.5px;
}
.lang-btn:hover  { background:var(--pink-dust); }
.lang-btn.active { background:var(--pink-deep); color:white; border-color:var(--pink-deep); }

/* ── LAYOUT ── */
.layout {
  position:relative; z-index:1;
  display:flex;
  gap:18px;
  max-width:1080px;
  margin:0 auto;
  padding:10px 18px 24px;
  align-items:flex-start;
}

/* ── MAP ── */
.map-side { flex:1; min-width:0; }

.legend {
  display:flex;
  flex-wrap:wrap;
  gap:5px 12px;
  margin-bottom:10px;
  align-items:center;
}
.leg {
  display:flex; align-items:center; gap:5px;
  font-size:11px; color:#7a5580; font-family:sans-serif;
}
.leg-sq { width:13px; height:13px; border-radius:3px; flex-shrink:0; }

svg.paris-map {
  width:100%; max-width:640px; height:auto; display:block;
  filter:drop-shadow(0 4px 18px rgba(180,80,120,.14));
}
.arr-hex { cursor:pointer; }
.arr-hex polygon {
  stroke:rgba(255,255,255,.85); stroke-width:2;
  transition:filter .18s, stroke-width .18s;
}
.arr-hex:hover  polygon { filter:brightness(1.12); stroke-width:2.5; }
.arr-hex.active polygon { stroke:var(--pink-deep); stroke-width:3.5; filter:brightness(1.08); }
.arr-num  { font-family:Arial,sans-serif; font-weight:800; font-size:14px; fill:rgba(255,255,255,.97); text-anchor:middle; dominant-baseline:middle; pointer-events:none; }
.arr-sub  { font-family:Arial,sans-serif; font-size:8px; font-weight:700; fill:rgba(255,255,255,.92);
            text-anchor:middle; dominant-baseline:middle; pointer-events:none;
            paint-order:stroke; stroke:rgba(0,0,0,.18); stroke-width:2px; stroke-linejoin:round; }
.arr-icon { font-size:9px; text-anchor:middle; dominant-baseline:middle; pointer-events:none; }
.seine-bg  { fill:none; stroke:#90ccf0; stroke-width:5; opacity:.30; stroke-linecap:round; }
.seine     { fill:none; stroke:#2288cc; stroke-width:2; opacity:.55; stroke-linecap:round; stroke-linejoin:round; stroke-dasharray:6,3; }
.seine-label { font-family:Georgia,serif; font-size:10px; fill:#1a6aaa; font-style:italic; font-weight:700;
               paint-order:stroke; stroke:#fff; stroke-width:3px; stroke-linejoin:round; opacity:.9; }

/* ── INFO PANEL ── */
.info-panel {
  width:285px; flex-shrink:0;
  position:sticky; top:16px;
}
.info-card {
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(10px);
  border-radius:16px; padding:20px;
  box-shadow:0 4px 24px rgba(180,80,130,.15);
  border:1px solid rgba(240,160,200,.3);
  min-height:280px;
}
.placeholder { text-align:center; padding:28px 8px; }
.placeholder .ico { font-size:46px; display:block; margin-bottom:10px; }
.placeholder p    { font-size:13px; color:#9a6090; line-height:1.6; }

.info-header {
  display:flex; gap:10px; align-items:flex-start;
  margin-bottom:12px; padding-bottom:11px;
  border-bottom:1px solid #f0d0e4;
}
.num-badge {
  width:42px; height:42px; border-radius:10px; color:#fff;
  font-weight:800; font-size:15px; font-family:sans-serif;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.info-title h3        { font-size:15px; color:var(--dark); margin-bottom:2px; }
.info-title .dist     { font-size:11px; color:#9a6090; font-style:italic; }
.info-title .landmark-badge { font-size:11px; color:#3a78b8; font-family:sans-serif; margin-top:2px; }

.stars-row { display:flex; align-items:center; gap:7px; margin-bottom:12px; font-family:sans-serif; }
.stars-row span:first-child { font-size:11px; color:#9a6090; }
.stars { color:var(--pink-deep); font-size:15px; }

.spot-list { list-style:none; margin-bottom:12px; }
.spot-item {
  padding:7px 10px; border-radius:8px;
  background:#fff5fa; border-left:3px solid var(--pink-soft);
  margin-bottom:6px; font-family:sans-serif; font-size:12px;
  cursor:pointer; transition:background .15s, border-color .15s;
}
.spot-item:hover { background:#ffedf5; border-left-color:var(--pink-deep); }
.spot-item .sname { font-weight:700; color:var(--dark); display:flex; align-items:center; justify-content:space-between; margin-bottom:3px; }
.spot-item .sname-text { flex:1; }
.map-pin { font-size:13px; opacity:.5; transition:opacity .15s; flex-shrink:0; margin-left:6px; }
.spot-item:hover .map-pin { opacity:1; }
.spot-meta  { display:flex; gap:7px; align-items:center; flex-wrap:wrap; }
.tag        { padding:1px 7px; border-radius:10px; font-size:10px; font-weight:700; }
.tag.cherry   { background:#fde0ea; color:#c0305a; }
.tag.magnolia { background:#ede0fa; color:#7040a0; }
.mag-sym      { color:#9050c8; font-size:13px; line-height:1; }
.peak { font-size:10px; color:#9090a0; }

.tip-box {
  background:#f0f8f0; border-left:3px solid #a0c8a0;
  border-radius:7px; padding:9px 11px;
  font-size:11.5px; color:var(--green); font-family:sans-serif; line-height:1.5;
}
.tip-box::before { content:"💡 "; }

/* ── TOOLTIP ── */
.tip {
  position:fixed; background:rgba(35,10,45,.88); color:#fff;
  padding:5px 10px; border-radius:8px; font-size:12px; font-family:sans-serif;
  pointer-events:none; white-space:nowrap; z-index:999; display:none;
  transform:translate(-50%,-130%);
}

/* ── CALENDAR ── */
.calendar {
  position:relative; z-index:1;
  max-width:1080px; margin:0 auto; padding:0 18px 32px;
}
.calendar h2 { text-align:center; font-size:1.05rem; margin-bottom:12px; color:var(--dark); }
.cal-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.cal-phase { border-radius:12px; padding:13px 14px; border:1px solid rgba(220,160,200,.25); }
.cal-phase h4 { font-size:12px; font-weight:700; margin-bottom:8px; font-family:sans-serif; }
.cal-phase ul { list-style:none; }
.cal-phase li { font-size:11px; font-family:sans-serif; color:#7a5580; padding:2px 0; line-height:1.5; }
.ph1 { background:#f0ecff; } .ph1 h4 { color:#6030b0; }
.ph2 { background:#fdeef8; } .ph2 h4 { color:#c030a0; }
.ph3 { background:#fff0f5; } .ph3 h4 { color:var(--pink-deep); }
.ph4 { background:#fff8f0; } .ph4 h4 { color:#c06020; }

/* ── AUTHOR CARD ── */
.author-card {
  margin-top:12px;
  background:rgba(255,255,255,.88);
  backdrop-filter:blur(10px);
  border-radius:14px;
  padding:14px 16px;
  box-shadow:0 2px 14px rgba(180,80,130,.10);
  border:1px solid rgba(240,160,200,.3);
  font-family:sans-serif;
  text-align:center;
}
.author-by {
  font-size:10px;
  color:#b07090;
  letter-spacing:.5px;
  text-transform:uppercase;
  margin-bottom:6px;
}
.author-name {
  font-size:14px;
  font-weight:800;
  color:var(--dark);
  margin-bottom:2px;
}
.author-location {
  font-size:11px;
  color:#9a6090;
  font-style:italic;
  margin-bottom:10px;
}
.author-linkedin {
  display:inline-flex;
  align-items:center;
  gap:5px;
  padding:5px 14px;
  border-radius:20px;
  background:var(--pink-deep);
  color:#fff;
  font-size:11px;
  font-weight:700;
  text-decoration:none;
  letter-spacing:.4px;
  transition:background .18s, transform .12s;
}
.author-linkedin:hover {
  background:#a02050;
  transform:translateY(-1px);
}
.author-linkedin svg {
  width:13px; height:13px; fill:#fff; flex-shrink:0;
}

@media(max-width:700px){
  .layout    { flex-direction:column; }
  .info-panel{ width:100%; position:static; }
  .cal-grid  { grid-template-columns:1fr 1fr; }
}
</style>
</head>
<body>

<div class="petals" id="petals"></div>

<header>
  <h1 id="h-title">🌸 Paris Cherry Blossom &amp; Magnolia</h1>
  <p  id="h-sub">Interactive map by arrondissement · Click to explore bloom spots &amp; timing</p>
   <div class="lang-bar">
    <button class="lang-btn active" id="btn-en" onclick="setLang('en')">🇬🇧 EN</button>
    <button class="lang-btn"        id="btn-fr" onclick="setLang('fr')">🇫🇷 FR</button>
  </div>
</header>

<div class="tip" id="tip"></div>

<div class="layout">
  <div class="map-side">
    <div class="legend" id="legend"></div>
    <svg class="paris-map" viewBox="0 0 650 515" id="mapSvg">
      <defs>
        <linearGradient id="seineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="#b8dcf5"/>
          <stop offset="40%"  stop-color="#4aa8e8"/>
          <stop offset="60%"  stop-color="#3a98d8"/>
          <stop offset="100%" stop-color="#b8dcf5"/>
        </linearGradient>
        <filter id="riverGlow" x="-20%" y="-80%" width="140%" height="260%">
          <feGaussianBlur stdDeviation="2.5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <g id="hexG"></g>
      <!-- La Seine — drawn AFTER hexes so it overlays the tiles -->
      <path class="seine-bg" d="M 42,300 C 95,296 148,288 210,280 C 258,274 292,271 328,273 C 368,275 398,267 445,260 C 492,253 555,249 638,245"/>
      <path class="seine"
            d="M 42,300 C 95,296 148,288 210,280 C 258,274 292,271 328,273 C 368,275 398,267 445,260 C 492,253 555,249 638,245"/>
      <path id="seinePath" fill="none"
            d="M 42,300 C 95,296 148,288 210,280 C 258,274 292,271 328,273 C 368,275 398,267 445,260 C 492,253 555,249 638,245"/>
      <text class="seine-label">
        <textPath href="#seinePath" startOffset="4%">〰 la Seine</textPath>
      </text>
    </svg>
  </div>

  <div class="info-panel">
    <div class="info-card" id="infoCard"></div>
    <div class="author-card" id="authorCard"></div>
  </div>
</div>

<div class="calendar">
  <h2 id="cal-title"></h2>
  <div class="cal-grid" id="cal-grid"></div>
</div>

<script>

// ─── HEX GRID ─────────────────────────────────────────────────────────────────
const POS = {
  18:[3,0], 19:[4,0],
  17:[2,1],  9:[3,1], 10:[4,1], 20:[5,1],
  16:[1,2],  8:[2,2],  2:[3,2],  3:[4,2], 11:[5,2],
             7:[2,3],  1:[3,3],  4:[4,3], 12:[5,3],
  15:[1,4],  6:[2,4],  5:[3,4], 13:[4,4],
                       14:[3,5],
};

const COLORS = ['#fcdce8','#f8b8d0','#f090b0','#e0608a','#c0305a'];
function col(s){ return COLORS[s-1]; }

const R = 50, W = R * Math.sqrt(3), H = R * 2, SX = 82, SY = 52;

function hexCenter(c, r){
  return [ c * W + (r % 2 === 1 ? W / 2 : 0) + SX,  r * H * 0.75 + SY ];
}
function hexPts(cx, cy){
  return Array.from({length:6}, (_,i) => {
    const a = Math.PI / 180 * (60 * i - 90);
    return `${(cx + R * Math.cos(a)).toFixed(1)},${(cy + R * Math.sin(a)).toFixed(1)}`;
  }).join(' ');
}

// ─── BUILD HEX MAP ────────────────────────────────────────────────────────────
const g   = document.getElementById('hexG');
const tip = document.getElementById('tip');
const NS  = 'http://www.w3.org/2000/svg';
let   sel = null;

function svgEl(tag, attrs){
  const el = document.createElementNS(NS, tag);
  Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k,v));
  return el;
}
function svgTxt(txt, attrs){
  const el = svgEl('text', attrs);
  el.textContent = txt;
  return el;
}

Object.entries(POS).forEach(([num, [c, r]]) => {
  const n = parseInt(num), d = D[n];
  const [cx, cy] = hexCenter(c, r);
  const grp = svgEl('g', {'class':'arr-hex', 'data-n':n});

  grp.appendChild(svgEl('polygon', {points:hexPts(cx,cy), fill:col(d.spots.length)}));

  // Monument emoji — tourist-map style icon above the arrondissement number
  const iconEl = svgEl('text',{'text-anchor':'middle','dominant-baseline':'middle',
                                'font-size':'15', x:cx, y:cy-27, 'pointer-events':'none'});
  iconEl.textContent = ICONS[n] || '📍';
  grp.appendChild(iconEl);

  // Arrondissement number (shifted slightly down to make room for icon)
  grp.appendChild(svgTxt(n===1?'1er':n+'e', {'class':'arr-num', x:cx, y:cy-8}));

  // Landmark badge — dark pill behind text for legibility
  const shortL = d.landmark.length > 11 ? d.landmark.substring(0,10)+'…' : d.landmark;
  const badgeW = Math.min(shortL.length * 5.2 + 10, 78);
  const badge = svgEl('rect',{x:cx-badgeW/2, y:cy+4, width:badgeW, height:13, rx:4,
                               fill:'rgba(0,0,0,.28)', 'pointer-events':'none'});
  grp.appendChild(badge);
  grp.appendChild(svgTxt(shortL, {'class':'arr-sub', x:cx, y:cy+12}));

  const hasC = d.spots.some(s=>s.t==='cherry'), hasM = d.spots.some(s=>s.t==='magnolia');
  const both = hasC && hasM;
  let ix = cx - (both ? 8 : 0);
  // Cherry emoji 🌸
  if(hasC){
    const t=svgEl('text',{'text-anchor':'middle','dominant-baseline':'middle','font-size':'12',x:ix,y:cy+28});
    t.textContent='🌸'; grp.appendChild(t); ix+=15;
  }
  // Magnolia ✿ in purple — visually distinct from cherry
  if(hasM){
    const t=svgEl('text',{'text-anchor':'middle','dominant-baseline':'middle','font-size':'13','fill':'#9050c8','font-weight':'bold',x:ix,y:cy+28});
    t.textContent='✿'; grp.appendChild(t);
  }

  grp.addEventListener('mouseenter', e => {
    tip.style.display='block';
    tip.textContent=`${n}e · ${d.dist} · ${T[LANG].spots(d.spots.length)}`;
  });
  grp.addEventListener('mousemove',  e => { tip.style.left=e.clientX+'px'; tip.style.top=(e.clientY-4)+'px'; });
  grp.addEventListener('mouseleave', ()=> tip.style.display='none');
  grp.addEventListener('click', () => {
    if(sel!==null){ const p=g.querySelector(`[data-n="${sel}"]`); if(p) p.classList.remove('active'); }
    sel=n; grp.classList.add('active'); renderInfo(n);
  });
  g.appendChild(grp);
});

// ─── RENDER INFO PANEL ───────────────────────────────────────────────────────
function renderInfo(n){
  if(n===null){ renderPlaceholder(); return; }
  const d=D[n], t=T[LANG];
  const sc=d.spots.length, clr=col(sc), ord=n===1?(LANG==='fr'?'1er':'1st'):n+'e';
  const stars='★'.repeat(sc)+'☆'.repeat(5-sc);
  const tip_txt = LANG==='fr' ? d.tip_fr : d.tip_en;

  const spots = d.spots.map(s=>`
    <li class="spot-item" data-place="${s.n.replace(/"/g,'&quot;')}">
      <span class="sname">
        <span class="sname-text">${s.n}</span>
        <span class="map-pin" title="Open in Google Maps">📍</span>
      </span>
      <span class="spot-meta">
        <span class="tag ${s.t}">${s.t==='cherry' ? t.cherry : t.magnolia}</span>
        <span class="peak">⏱ ${peak(s.p)}</span>
      </span>
    </li>`).join('');

  document.getElementById('infoCard').innerHTML=`
    <div class="info-header">
      <div class="num-badge" style="background:${clr}">${ord}</div>
      <div class="info-title">
        <h3>${t.arrLabel(n)}</h3>
        <div class="dist">${d.dist}</div>
        <div class="landmark-badge">🏛️ ${d.landmark}</div>
      </div>
    </div>
    <div class="stars-row"><span>${t.intensity}</span><span class="stars">${stars}</span></div>
    <ul class="spot-list">${spots}</ul>
    <div class="tip-box">${tip_txt}</div>`;

  // Attach Google Maps click handlers to each spot
  document.querySelectorAll('#infoCard .spot-item').forEach(el => {
    el.addEventListener('click', () => openMap(el.dataset.place));
  });
}

function renderPlaceholder(){
  const t=T[LANG];
  document.getElementById('infoCard').innerHTML=`
    <div class="placeholder">
      <span class="ico">🌸</span>
      <p><strong>${t.ph1}</strong><br>${t.ph2}</p>
    </div>`;
}

    {c:'#f8b8d0', txt:t.leg2},{c:'#fcdce8', txt:t.leg1},

    items.map(i=>`<div class="leg"><div class="leg-sq" style="background:${i.c}"></div>${i.txt}</div>`).join('') +
    `<div class="leg" style="margin-left:6px">${t.legTypes}</div>`;
}

// ─── LANGUAGE SWITCH ─────────────────────────────────────────────────────────
function setLang(l){
  LANG=l;
  document.getElementById('btn-en').classList.toggle('active', l==='en');
  document.getElementById('btn-fr').classList.toggle('active', l==='fr');
  document.getElementById('h-title').innerHTML = T[l].title;
  document.getElementById('h-sub').innerHTML   = T[l].subtitle;
  renderLegend();
  renderCalendar();
  renderInfo(sel);
  renderAuthor();
  // update tooltips on hover (live via LANG var, no action needed)
}

// ─── GOOGLE MAPS ─────────────────────────────────────────────────────────────
function openMap(name){
  // Strip parenthetical suffixes like "(cerisiers)" before searching
  const clean = name.replace(/\s*\(.*?\)\s*$/,'').trim();
  const q = encodeURIComponent(clean + ', Paris, France');
  window.open('https://www.google.com/maps/search/?api=1&query=' + q, '_blank', 'noopener,noreferrer');
}
